server:
  servlet:
    context-path: /api/v1

spring:

  application:
    name: aldalka

  jackson:
    time-zone: Asia/Seoul

  datasource:
   # url: jdbc:mysql://${DB_ADDRESS}:3306/aldalka?serverTimezone=Asia/Seoul&useUnicode=yes&characterEncoding=UTF-8
    url: jdbc:mysql://172.16.0.55:3306/aldalka?serverTimezone=Asia/Seoul&useUnicode=yes&characterEncoding=UTF-8
    
    username: itcen
    password: itcen1@3$
    
   # username: ${DB_USERNAME}
   # password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      pool-name: MyHikariCP
      validation-timeout: 5000
      auto-commit: false
      data-source-properties:
        rewriteBatchedStatements: true


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties:
      "[hibernate.format_sql]": true
      "[hibernate.order_inserts]": true
      "[hibernate.order_updates]": true
      "[hibernate.default_batch_fetch_size]": 1000
      "[hibernate.jdbc.batch_size]": 1000
      "[hibernate.jdbc.batch_versioned_data]": true
      "[hibernate.connection.provider_disables_autocommit]": true

