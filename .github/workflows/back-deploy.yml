name: Back CI/CD

on:
  push:
    paths:
      - 'back/**'
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-22.04
    outputs:
      date_tag: ${{ steps.set-tag.outputs.date_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set DATE_TAG
        run: echo "DATE_TAG=dev-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      
      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./back
          file: ./back/Dockerfile
          platforms: linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/back:${{ env.DATE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/back:latest

  deploy:
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Deploy via Bastion Host
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.BACK_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          port: ${{ secrets.BACK_PORT }}                        
          key: ${{ secrets.EC2_SSH_KEY }}

          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.EC2_USERNAME }}
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          proxy_port: ${{ secrets.BASTION_PORT }}

          script: |
            set -e
            cd ~/back
            ./deploy.sh backend

  notify:
    needs: deploy
    runs-on: ubuntu-22.04
    if: success()

    steps:
      - name: Discord Notification
        uses: Ilshidur/action-discord@master
        with:
          args: "👍 [BACK] 이미지 푸시 및 배포 완료: `${{ needs.build.outputs.date_tag }}`"
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
