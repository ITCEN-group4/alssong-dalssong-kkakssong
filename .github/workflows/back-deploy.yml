name: Back CI/CD

on:
  push:
    paths:
      - 'back/**'
    branches:
      - develop

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set DATE_TAG
        run: echo "DATE_TAG=dev-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./back
          file: ./back/Dockerfile
          platforms: linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/back:${{ env.DATE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/back:latest

    
      - name: Deploy via Bastion Host
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.BACK_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          port: ${{ secrets.BACK_PORT }}                        
          key: ${{ secrets.EC2_SSH_KEY }}

          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.EC2_USERNAME }}
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          proxy_port: ${{ secrets.BASTION_PORT }}                   

          script: |
            set -e
            cd ~/back
            ./deploy.sh backend

      - name: Discord Notification
        if: success()
        uses: Ilshidur/action-discord@master
        with:
          args: "✅ [BACK] 이미지 푸시 완료: `${{ env.DATE_TAG }}`"
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
