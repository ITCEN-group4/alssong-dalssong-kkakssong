name: pr-ci

on:
  pull_request:
    branches: [develop]

jobs:
  backend-ci:
    name: Backend CI
    if: contains(join(github.event.pull_request.files.*), 'back/')
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: back

    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Grant Gradle permissions
        run: chmod +x ./gradlew

      - name: Run Gradle tests
        run: ./gradlew test

      - name: Publish test results to PR comment
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/build/test-results/test/TEST-*.xml'

      - name: Annotate test failures in PR
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'

  frontend-ci:
    name: Frontend CI
    if: contains(join(github.event.pull_request.files.*), 'front/')
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: front

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
