name: Frontend PR CI

on:
  pull_request:
    branches: [develop]
    paths:
      - 'front/**'

jobs:
  check-frontend-changes:
    name: Check Frontend Changes
    runs-on: ubuntu-22.04
    outputs:
      changed: ${{ steps.changes.outputs.any_changed }}
    steps:
      - name: Check for frontend changes
        id: changes
        uses: tj-actions/changed-files@v44
        with:
          files: front/**

  run-frontend-tests:
    name: Run Frontend Tests
    needs: check-frontend-changes
    if: needs.check-frontend-changes.outputs.changed == 'true'
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: front
      
    permissions:
      checks: write
      pull-requests: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Vite build
        run: npm run build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: front/junit.xml

  report-frontend-test-results:
    name: Report Frontend Test Results
    needs: run-frontend-tests
    if: always()
    runs-on: ubuntu-22.04

    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: frontend-test-results
          path: test-results

      - name: Annotate test failures on PR
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: test-results/**/*.xml
          detailed_summary: true
          check_name: 'Frontend JUnit Test Report'
