name: back-pr-ci

on:
  pull_request:
    branches: [develop]
    paths:
      - 'back/**'

jobs:
  back-ci:
    name: pr-ci
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: back

    permissions:
      checks: write
      pull-requests: write

    env:
      DB_ADDRESS: ${{ secrets.DB_ADDRESS }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    
    steps:
      - name: 백엔드 코드가 변경되었는지 확인
        id: changes
        uses: tj-actions/changed-files@v44
        with:
          files: back/**

      - name: 백엔드 변경 없으면 종료
        if: steps.changes.outputs.any_changed == 'false'
        run: |
          echo "No backend changes. Skipping back CI."
          exit 0
      
      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설치 및 Gradle 캐시 설정
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle # Gradle 종속성 캐싱으로 속도 향상
      
      - name: 현재 환경 변수 출력
        run: env
        
      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: ✅Gradle로 테스트 실행
        run: ./gradlew test 

      - name: 🖍️테스트 결과를 PR 코멘트로 출력
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/build/test-results/test/TEST-*.xml'

      - name: 테스트 실패 시, 코드 라인에 코멘트 추가
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
