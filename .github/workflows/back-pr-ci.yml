name: back-pr-ci

on:
  pull_request:
    branches: [main]
    paths:
      - 'back/**'

jobs:
  back-ci:
    name: back-ci
    runs-on: ubuntu-22.04
		
		defaults:
      run:
        working-directory: back
		
    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle 캐시 설정
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle # Gradle 종속성 캐싱으로 속도 향상

      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: Gradle로 테스트만 실행
        run: ./gradlew test # build가 아니라 test만 수행

      - name: 테스트 결과를 PR 코멘트로 출력
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/build/test-results/test/TEST-*.xml'

      - name: 테스트 실패 시, 코드 라인에 코멘트 추가
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
