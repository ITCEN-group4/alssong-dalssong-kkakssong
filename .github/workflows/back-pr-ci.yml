name: Backend PR CI

on:
  pull_request:
    branches: [develop]
    paths:
      - 'back/**'

permissions:
  checks: write
  pull-requests: write

jobs:
  check-backend-changes:
    name: Check Backend Changes
    runs-on: ubuntu-22.04
    outputs:
      changed: ${{ steps.changes.outputs.any_changed }}
    steps:
      - name: Check for backend changes
        id: changes
        uses: tj-actions/changed-files@v44
        with:
          files: back/**

  run-backend-tests:
    name: Run Backend Tests
    needs: check-backend-changes
    if: needs.check-backend-changes.outputs.changed == 'true'
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: back

    permissions:
      checks: write
      pull-requests: write

    env:
      DB_ADDRESS: ${{ secrets.DB_ADDRESS }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 and Gradle cache
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Print environment variables (for debug)
        run: env

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run Gradle tests
        run: ./gradlew test

      - name: Upload test results (for report job)
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: back/build/test-results/test/

  report-test-results:
    name: Report Test Results
    needs: run-backend-tests
    if: always()
    runs-on: ubuntu-22.04

    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results

      - name: Annotate test failures on PR
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: test-results/TEST-*.xml
          detailed_summary: true
          check_name: 'JUnit Test Report'
