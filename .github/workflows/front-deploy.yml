name: Front CI/CD

on:
  push:
    paths:
      - 'front/**'
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-22.04
    outputs:
      date_tag: ${{ steps.set-tag.outputs.date_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set DATE_TAG
        id: set-tag
        run: |
          TAG=dev-$(TZ=Asia/Seoul date +%Y%m%d-%H%M)
          echo "date_tag=$TAG" >> $GITHUB_OUTPUT
          echo "DATE_TAG=$TAG" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./front
          file: ./front/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/front:${{ env.DATE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/front:latest

  deploy:
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Deploy via Bastion Host
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.FRONT_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          port: ${{ secrets.FRONT_PORT }}
          key: ${{ secrets.EC2_SSH_KEY }}
          
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.EC2_USERNAME }}
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          proxy_port: ${{ secrets.BASTION_PORT }}

          script: |
            set -e
            cd ~/front
            ./deploy.sh front

  notify:
    needs: [build, deploy]
    runs-on: ubuntu-22.04
    if: success()

    steps:
      - name: Discord Notification
        uses: Ilshidur/action-discord@master
        with:
          args: "👍 [FRONT] 이미지 푸시 및 배포 완료: `${{ needs.build.outputs.date_tag }}`"
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
